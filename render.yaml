services:
  - type: web
    name: psicosystem-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn psicosystem.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: psicosystem-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.12.2

databases:
  - name: psicosystem-db
    plan: free
    region: oregon
