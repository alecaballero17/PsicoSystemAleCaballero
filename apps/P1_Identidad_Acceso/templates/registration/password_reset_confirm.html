<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña | PsicoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm border-0" style="width: 25rem;">
        <div class="card-body p-4 text-center">
            <h4 class="fw-bold mb-3">Establecer Contraseña</h4>
            {% if validlink %}
                <p class="text-muted small mb-4">Ingresa tu nueva contraseña dos veces para verificarla.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Actualizar Contraseña</button>
                </form>
            {% else %}
                <p class="text-danger mb-4">El enlace para restablecer la contraseña es inválido o ha expirado. Por favor solicita uno nuevo.</p>
                <a href="{% url 'password_reset' %}" class="btn btn-outline-secondary w-100">Solicitar nuevo enlace</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
