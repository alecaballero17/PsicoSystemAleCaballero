<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña | PsicoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm border-0" style="width: 25rem;">
        <div class="card-body p-4 text-center">
            <h4 class="fw-bold mb-3">Recuperar Acceso</h4>
            <p class="text-muted small mb-4">Ingresa tu correo electrónico registrado y te enviaremos instrucciones para restaurar tu contraseña.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Enviar correo de enlace</button>
            </form>
            <a href="{% url 'login' %}" class="d-block mt-3 small text-decoration-none">Volver al login</a>
        </div>
    </div>
</body>
</html>
