<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | PsicoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0 mt-5">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">PsicoSystem</h3>
                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert py-2 small {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% else %}alert-info{% endif %}" role="alert">{{ message }}</div>
                        {% endfor %}
                        {% endif %}
                        {% if form.non_field_errors %}
                        <div class="alert alert-danger py-2 small" role="alert">{{ form.non_field_errors }}</div>
                        {% endif %}
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Nombre de usuario</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                        <p class="text-center text-muted small mt-4 mb-0">
                            ¿Primera vez en el sistema?
                            <a href="{% url 'registrar_psicologo' %}" class="fw-semibold">Crear cuenta (registro)</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
