<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CU25 - Registro de Clínicas | PsicoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white p-3">
                        <h4 class="mb-0 text-center">CU25: Registro de Clínicas</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted small text-center mb-4">Módulo: Paquete 1 - Identidad y Acceso</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Nombre de la Clínica</label>
                                {{ form.nombre }}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">NIT / Identificación Fiscal</label>
                                {{ form.nit }}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Plan de Suscripción (SaaS)</label>
                                {{ form.plan_suscripcion }}
                            </div>
                            <hr>
                            <button type="submit" class="btn btn-primary w-100 py-2">Registrar Clínica</button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3 small">
                    <a href="/admin" class="text-decoration-none">← Ir al Back-office</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
