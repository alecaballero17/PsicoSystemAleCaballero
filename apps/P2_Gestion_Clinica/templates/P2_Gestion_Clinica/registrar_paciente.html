<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CU06 - Registro de Pacientes | PsicoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center mb-3">
            <div class="col-md-8 d-flex justify-content-end">
                <a href="{% url 'listar_citas' %}" class="btn btn-outline-secondary me-2"><i class="bi bi-calendar2-check"></i> Mis Citas</a>
                <a href="{% url 'registrar_cita' %}" class="btn btn-outline-primary"><i class="bi bi-calendar-plus"></i> Agendar Cita</a>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white p-3 text-center">
                        <h4 class="mb-0">CU06: Gestión de Pacientes - Nuevo Registro</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <hr>
                            <button type="submit" class="btn btn-dark w-100">Guardar Ficha del Paciente</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
